
default:
  image: mcr.microsoft.com/dotnet/sdk:8.0
  interruptible: true
  cache:
    # Per-stage and per-branch caching.
    key: "$CI_JOB_STAGE-$CI_COMMIT_REF_SLUG"
    paths:
      # Specify three paths that should be cached:
      #
      # 1) Main JSON file holding information about package dependency tree, packages versions,
      # frameworks etc. It also holds information where to the dependencies were restored.
      - '$SOURCE_CODE_PATH$OBJECTS_DIRECTORY/project.assets.json'
      # 2) Other NuGet and MSBuild related files. Also needed.
      - '$SOURCE_CODE_PATH$OBJECTS_DIRECTORY/*.csproj.nuget.*'
      # 3) Path to the directory where restored dependencies are kept.
      - '$NUGET_PACKAGES_DIRECTORY'
  before_script:
    - 'dotnet restore --packages $NUGET_PACKAGES_DIRECTORY'

# ### Define variables
#
variables:
  # 1) Name of directory where restore and build objects are stored.
  OBJECTS_DIRECTORY: 'obj'
  # 2) Name of directory used for keeping restored dependencies.
  NUGET_PACKAGES_DIRECTORY: '.nuget'
  # 3) A relative path to the source code from project repository root.
  # NOTE: Please edit this path so it matches the structure of your project!
  SOURCE_CODE_PATH: '*/*/'

build:
  stage: build
  script:
    - 'dotnet build --no-restore'

tests:
  stage: test
  services:
  - name: docker:dind
    # explicitly disable tls to avoid docker startup interruption
    command: ["--tls=false"]
  variables:
    # Instruct Testcontainers to use the daemon of DinD, use port 2375 for non-tls connections.
    DOCKER_HOST: "tcp://docker:2375"
    # Instruct Docker not to start over TLS.
    DOCKER_TLS_CERTDIR: ""
    # Improve performance with overlayfs.
    DOCKER_DRIVER: overlay2
  script:
    - 'dotnet test --no-restore'

deploy:
  stage: deploy
  cache: []
  environment: production
  image: google/cloud-sdk:latest
  variables:
    PROJECT_ID: "avstemming-speidertinget"
    IMAGE: gcr.io/$PROJECT_ID/stemme:$CI_COMMIT_SHA
  before_script: 
    - export GOOGLE_CLOUD_CREDENTIALS=$(echo $BASE64_GOOGLE_CLOUD_CREDENTIALS | base64 -d)
    - echo $GOOGLE_CLOUD_CREDENTIALS > service-account-key.json 
    - gcloud auth activate-service-account --key-file=service-account-key.json
    - gcloud config set project $PROJECT_ID
  script: 
    - gcloud builds submit --tag $IMAGE
    - gcloud run deploy avstemming-st24 --image=$IMAGE --platform=managed --region=europe-north1 --allow-unauthenticated
  only:
    - master 

