image: mcr.microsoft.com/dotnet/sdk:6.0

stages:
  - test
  - deploy

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .nuget

test:
  stage: test
  script:
    - dotnet restore --packages .nuget
    - dotnet test --no-restore
production:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  script:
    - apk upgrade
    - apk add --no-cache --repository http://dl-cdn.alpinelinux.org/alpine/edge/main/ npm
    - npm i -g heroku
    - heroku container:login
    - docker build . -f Server/Dockerfile -t web
    - heroku container:push web -a stemmesystem
    - heroku container:release web -a stemmesystem
  only:
    - master 
