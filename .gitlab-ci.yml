stages:
    - build
    - test
    - deploy

build:
    stage: build
    image: mcr.microsoft.com/dotnet/sdk:5
    script:
        - "dotnet build"
    artifacts:
      paths:
        - bin/

test:
    stage: test
    image: mcr.microsoft.com/dotnet/sdk:5
    script: 
        - "dotnet test"
production:
    stage: deploy
    script: 
    - curl https://cli-assets.heroku.com/install.sh | sh
    - heroku container:login
    - docker build -t web
    - heroku container:push web -a stemmesystem
    - heroku container:release web -a stemmesystem
    only: 
    - master 
